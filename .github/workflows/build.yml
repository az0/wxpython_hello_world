name: Build Installers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3 (64-bit)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install UPX
        run: choco install upx --yes

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller
          --windowed
          --name wxHelloWorld
          --strip
          --exclude-module wx.html
          --exclude-module wx.html2
          --exclude-module wx.xml
          --exclude-module wx.richtext
          --exclude-module wx.stc
          --exclude-module wx.media
          --exclude-module wx.grid
          --exclude-module wx.dataview
          --exclude-module wx.glcanvas
          --exclude-module wx.svg
          --exclude-module wx.propgrid
          --exclude-module wx.ribbon
          --exclude-module wx.aui
          --exclude-module wx.py
          --exclude-module wx.adv
          --exclude-module wx.xrc
          --exclude-module tkinter
          --exclude-module unittest
          --exclude-module test
          --exclude-module email
          --exclude-module pydoc
          --exclude-module doctest
          --exclude-module sqlite3
          --exclude-module ssl
          --exclude-module asyncio
          --exclude-module multiprocessing
          --exclude-module lib2to3
          --exclude-module ensurepip
          --exclude-module venv
          --exclude-module idlelib
          --exclude-module turtledemo
          --exclude-module xmlrpc
          --exclude-module ftplib
          --exclude-module smtplib
          --exclude-module imaplib
          --exclude-module poplib
          --exclude-module socketserver
          --exclude-module webbrowser
          --exclude-module turtle
          --exclude-module concurrent
          --exclude-module logging
          app.py

      - name: Remove unused files from dist
        shell: powershell
        run: |
          $dist = "dist\wxHelloWorld"
          # Remove locale files except English
          $localeDirs = @("share", "wx\locale")
          foreach ($d in $localeDirs) {
            $p = Join-Path $dist $d
            if (Test-Path $p) { Remove-Item -Recurse -Force $p }
          }
          # Remove unused wx DLLs if present
          $patterns = @("wx*html*", "wx*stc*", "wx*richtext*", "wx*media*", "wx*gl*", "wx*xml*", "wx*xrc*", "wx*propgrid*", "wx*ribbon*", "wx*aui*", "wx*svg*")
          foreach ($pat in $patterns) {
            Get-ChildItem -Path $dist -Recurse -Filter $pat | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          # Remove .pdb debug files
          Get-ChildItem -Path $dist -Recurse -Filter "*.pdb" | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Smoke test
        run: python app.py --smoke-test

      - name: Show build size
        run: |
          echo "--- dist contents ---"
          dir dist
          echo "--- compressed size estimate ---"
          powershell -Command "Compress-Archive -Path dist\wxHelloWorld\* -DestinationPath dist\wxHelloWorld.zip"
          dir dist\wxHelloWorld.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-windows-x64
          path: dist/wxHelloWorld

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle with PyInstaller
        run: >
          pyinstaller
          --windowed
          --name wxHelloWorld
          --strip
          --noupx
          --exclude-module wx.html
          --exclude-module wx.html2
          --exclude-module wx.xml
          --exclude-module wx.richtext
          --exclude-module wx.stc
          --exclude-module wx.media
          --exclude-module wx.grid
          --exclude-module wx.dataview
          --exclude-module wx.glcanvas
          --exclude-module wx.svg
          --exclude-module wx.propgrid
          --exclude-module wx.ribbon
          --exclude-module wx.aui
          --exclude-module wx.py
          --exclude-module wx.adv
          --exclude-module wx.xrc
          --exclude-module tkinter
          --exclude-module unittest
          --exclude-module test
          --exclude-module email
          --exclude-module pydoc
          --exclude-module doctest
          --exclude-module sqlite3
          --exclude-module ssl
          --exclude-module asyncio
          --exclude-module multiprocessing
          --exclude-module lib2to3
          --exclude-module ensurepip
          --exclude-module venv
          --exclude-module idlelib
          --exclude-module turtledemo
          --exclude-module xmlrpc
          --exclude-module ftplib
          --exclude-module smtplib
          --exclude-module imaplib
          --exclude-module poplib
          --exclude-module socketserver
          --exclude-module webbrowser
          --exclude-module turtle
          --exclude-module concurrent
          --exclude-module logging
          app.py

      - name: Remove unused files from .app
        run: |
          CONTENTS="dist/wxHelloWorld.app/Contents"
          FWDIR="$CONTENTS/Frameworks"
          RESDIR="$CONTENTS/Resources"

          echo "=== Before cleanup ==="
          du -sh dist/wxHelloWorld.app

          # Remove unused wx native dylibs
          for pat in "*html*" "*stc*" "*richtext*" "*media*" "*gl*" "*xml*" "*xrc*" "*propgrid*" "*ribbon*" "*aui*" "*svg*" "*webview*" "*qa*"; do
            find "$FWDIR" -name "libwx_osx*${pat}*" -delete 2>/dev/null || true
          done

          # Remove unused wx Python extension modules (.so files)
          for mod in _html _html2 _stc _richtext _media _grid _dataview _glcanvas _svg _propgrid _ribbon _aui _xml _xrc _adv; do
            find "$FWDIR" -name "${mod}.cpython-*.so" -delete 2>/dev/null || true
          done
          # Remove unused wx subpackage directories
          for dir in html html2 stc richtext media grid dataview glcanvas svg propgrid ribbon aui xml xrc py adv; do
            find "$FWDIR" -path "*/wx/${dir}" -type d -exec rm -rf {} + 2>/dev/null || true
          done

          # Remove locale/share directories
          rm -rf "$RESDIR/share" 2>/dev/null || true
          find "$FWDIR" -path "*/locale" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$FWDIR" -path "*/locales" -type d -exec rm -rf {} + 2>/dev/null || true

          # Remove .pyi stub files and __pycache__
          find "$FWDIR" -name "*.pyi" -delete 2>/dev/null || true
          find "$FWDIR" -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$FWDIR" -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true

          # Strip all dylibs and .so files more aggressively
          find "$FWDIR" \( -name "*.dylib" -o -name "*.so" \) -exec strip -x -S {} \; 2>/dev/null || true

          echo "=== After cleanup ==="
          du -sh dist/wxHelloWorld.app

      - name: Smoke test built app
        run: |
          dist/wxHelloWorld.app/Contents/MacOS/wxHelloWorld --smoke-test

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG installer
        run: |
          create-dmg \
            --volname "wxHelloWorld" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "wxHelloWorld.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/wxHelloWorld.dmg" \
            "dist/wxHelloWorld.app"

      - name: Show build size
        run: |
          echo "--- dist contents ---"
          ls -lh dist/
          echo "--- .app bundle size ---"
          du -sh dist/wxHelloWorld.app
          echo "--- DMG size ---"
          ls -lh dist/wxHelloWorld.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-macos-dmg
          path: dist/wxHelloWorld.dmg
