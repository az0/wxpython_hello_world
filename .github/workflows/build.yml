name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3 (64-bit)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller
          --windowed
          --name wxHelloWorld
          --strip
          --noupx
          app.py

      - name: Smoke test built EXE
        shell: powershell
        run: |
          $exe = "dist\wxHelloWorld\wxHelloWorld.exe"
          $proc = Start-Process -FilePath $exe -ArgumentList "--smoke-test" -PassThru
          $finished = $proc.WaitForExit(15000)
          if (-not $finished) {
            $proc.Kill()
            throw "Smoke test timed out after 15 seconds"
          }
          if ($proc.ExitCode -ne 0) {
            throw "Smoke test failed with exit code $($proc.ExitCode)"
          }

      - name: Show build size
        run: |
          echo "--- dist contents ---"
          dir dist
          echo "--- compressed size estimate ---"
          powershell -Command "Compress-Archive -Path dist\wxHelloWorld\* -DestinationPath dist\wxHelloWorld.zip"
          dir dist\wxHelloWorld.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-windows-x64
          path: dist/wxHelloWorld
