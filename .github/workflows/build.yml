name: Build Installers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3 (64-bit)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install UPX
        run: choco install upx -y --no-progress

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller
          --windowed
          --name wxHelloWorld
          --strip
          --noupx
          --add-binary "C:\Windows\System32\MSVCP140.dll;."
          --exclude-module wx.html
          --exclude-module wx.html2
          --exclude-module wx.xml
          --exclude-module wx.richtext
          --exclude-module wx.stc
          --exclude-module wx.media
          --exclude-module wx.grid
          --exclude-module wx.dataview
          --exclude-module wx.glcanvas
          --exclude-module wx.svg
          --exclude-module wx.propgrid
          --exclude-module wx.ribbon
          --exclude-module wx.aui
          --exclude-module wx.py
          --exclude-module wx.adv
          --exclude-module wx.xrc
          --exclude-module tkinter
          --exclude-module unittest
          --exclude-module test
          --exclude-module email
          --exclude-module pydoc
          --exclude-module doctest
          --exclude-module sqlite3
          --exclude-module ssl
          --exclude-module asyncio
          --exclude-module multiprocessing
          --exclude-module lib2to3
          --exclude-module ensurepip
          --exclude-module venv
          --exclude-module idlelib
          --exclude-module turtledemo
          --exclude-module xmlrpc
          --exclude-module ftplib
          --exclude-module smtplib
          --exclude-module imaplib
          --exclude-module poplib
          --exclude-module socketserver
          --exclude-module webbrowser
          --exclude-module turtle
          --exclude-module concurrent
          --exclude-module logging
          app.py

      - name: Remove unused files from dist
        shell: powershell
        run: |
          $dist = "dist\wxHelloWorld"
          # Remove locale files except English
          $localeDirs = @("share", "wx\locale")
          foreach ($d in $localeDirs) {
            $p = Join-Path $dist $d
            if (Test-Path $p) { Remove-Item -Recurse -Force $p }
          }
          # Remove unused wx DLLs if present
          $patterns = @("wx*html*", "wx*stc*", "wx*richtext*", "wx*media*", "wx*gl*", "wx*xml*", "wx*xrc*", "wx*propgrid*", "wx*ribbon*", "wx*aui*", "wx*svg*")
          foreach ($pat in $patterns) {
            Get-ChildItem -Path $dist -Recurse -Filter $pat | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          # Remove .pdb debug files
          Get-ChildItem -Path $dist -Recurse -Filter "*.pdb" | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Compress binaries with UPX
        shell: powershell
        run: |
          $dist = "dist\wxHelloWorld"
          Get-ChildItem -Path $dist -Recurse -Include "*.pyd","*.dll" | ForEach-Object {
            $null = & upx $_.FullName 2>&1
          }
          exit 0

      - name: Smoke test
        run: python app.py --smoke-test

      - name: Show build size
        run: |
          echo "--- dist contents ---"
          dir dist
          echo "--- compressed size estimate ---"
          powershell -Command "Compress-Archive -Path dist\wxHelloWorld\* -DestinationPath dist\wxHelloWorld.zip"
          dir dist\wxHelloWorld.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-windows-x64
          path: dist/wxHelloWorld

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle with PyInstaller
        run: >
          pyinstaller
          --windowed
          --name wxHelloWorld
          --strip
          --noupx
          --exclude-module wx.html
          --exclude-module wx.html2
          --exclude-module wx.xml
          --exclude-module wx.richtext
          --exclude-module wx.stc
          --exclude-module wx.media
          --exclude-module wx.grid
          --exclude-module wx.dataview
          --exclude-module wx.glcanvas
          --exclude-module wx.svg
          --exclude-module wx.propgrid
          --exclude-module wx.ribbon
          --exclude-module wx.aui
          --exclude-module wx.py
          --exclude-module wx.adv
          --exclude-module wx.xrc
          --exclude-module tkinter
          --exclude-module unittest
          --exclude-module test
          --exclude-module email
          --exclude-module pydoc
          --exclude-module doctest
          --exclude-module sqlite3
          --exclude-module ssl
          --exclude-module asyncio
          --exclude-module multiprocessing
          --exclude-module lib2to3
          --exclude-module ensurepip
          --exclude-module venv
          --exclude-module idlelib
          --exclude-module turtledemo
          --exclude-module xmlrpc
          --exclude-module ftplib
          --exclude-module smtplib
          --exclude-module imaplib
          --exclude-module poplib
          --exclude-module socketserver
          --exclude-module webbrowser
          --exclude-module turtle
          --exclude-module concurrent
          --exclude-module logging
          app.py

      - name: Remove unused files from .app
        run: |
          CONTENTS="dist/wxHelloWorld.app/Contents"
          FWDIR="$CONTENTS/Frameworks"
          RESDIR="$CONTENTS/Resources"

          echo "=== Before cleanup ==="
          du -sh dist/wxHelloWorld.app

          # Remove unused wx native dylibs
          for pat in "*html*" "*stc*" "*richtext*" "*media*" "*gl*" "*xml*" "*xrc*" "*propgrid*" "*ribbon*" "*aui*" "*svg*" "*webview*" "*qa*"; do
            find "$FWDIR" -name "libwx_osx*${pat}*" -delete 2>/dev/null || true
          done

          # Remove unused wx Python extension modules (.so files)
          for mod in _html _html2 _stc _richtext _media _grid _dataview _glcanvas _svg _propgrid _ribbon _aui _xml _xrc _adv; do
            find "$FWDIR" -name "${mod}.cpython-*.so" -delete 2>/dev/null || true
          done
          # Remove unused wx subpackage directories
          for dir in html html2 stc richtext media grid dataview glcanvas svg propgrid ribbon aui xml xrc py adv; do
            find "$FWDIR" -path "*/wx/${dir}" -type d -exec rm -rf {} + 2>/dev/null || true
          done

          # Remove locale/share directories
          rm -rf "$RESDIR/share" 2>/dev/null || true
          find "$FWDIR" -path "*/locale" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$FWDIR" -path "*/locales" -type d -exec rm -rf {} + 2>/dev/null || true

          # Remove .pyi stub files and __pycache__
          find "$FWDIR" -name "*.pyi" -delete 2>/dev/null || true
          find "$FWDIR" -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$FWDIR" -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true

          # Strip all dylibs and .so files more aggressively
          find "$FWDIR" \( -name "*.dylib" -o -name "*.so" \) -exec strip -x -S {} \; 2>/dev/null || true

          echo "=== After cleanup ==="
          du -sh dist/wxHelloWorld.app

      - name: Smoke test built app
        run: |
          dist/wxHelloWorld.app/Contents/MacOS/wxHelloWorld --smoke-test

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG installer
        run: |
          create-dmg \
            --volname "wxHelloWorld" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "wxHelloWorld.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/wxHelloWorld.dmg" \
            "dist/wxHelloWorld.app"

      - name: Show build size
        run: |
          echo "--- dist contents ---"
          ls -lh dist/
          echo "--- .app bundle size ---"
          du -sh dist/wxHelloWorld.app
          echo "--- DMG size ---"
          ls -lh dist/wxHelloWorld.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-macos-dmg
          path: dist/wxHelloWorld.dmg

  build-windows-nuitka:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3 (64-bit)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build EXE with Nuitka
        run: >
          python -m nuitka
          --standalone
          --assume-yes-for-downloads
          --windows-console-mode=disable
          --lto=yes
          --enable-plugin=anti-bloat
          --output-dir=dist-nuitka
          --nofollow-import-to=wx.html,wx.html2,wx.xml,wx.richtext,wx.stc,wx.media,wx.grid,wx.dataview,wx.glcanvas,wx.svg,wx.propgrid,wx.ribbon,wx.aui,wx.py,wx.adv,wx.xrc,tkinter,unittest,test,email,pydoc,doctest,sqlite3,ssl,asyncio,multiprocessing,lib2to3,ensurepip,venv,idlelib,turtledemo,xmlrpc,ftplib,smtplib,imaplib,poplib,socketserver,webbrowser,turtle,concurrent,logging
          --remove-output
          app.py

      - name: Remove unused files from dist
        shell: powershell
        run: |
          $dist = "dist-nuitka\app.dist"
          # Remove locale files
          $localeDirs = @("share", "wx\locale")
          foreach ($d in $localeDirs) {
            $p = Join-Path $dist $d
            if (Test-Path $p) { Remove-Item -Recurse -Force $p }
          }
          # Remove unused wx DLLs if present
          $patterns = @("wx*html*", "wx*stc*", "wx*richtext*", "wx*media*", "wx*gl*", "wx*xml*", "wx*xrc*", "wx*propgrid*", "wx*ribbon*", "wx*aui*", "wx*svg*", "wx*adv*")
          foreach ($pat in $patterns) {
            Get-ChildItem -Path $dist -Recurse -Filter $pat | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          # Remove .pdb debug files and .pyi stubs
          Get-ChildItem -Path $dist -Recurse -Filter "*.pdb" | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $dist -Recurse -Filter "*.pyi" | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Smoke test (source)
        run: python app.py --smoke-test

      - name: Show build size
        run: |
          echo "--- Nuitka dist contents ---"
          dir dist-nuitka
          dir dist-nuitka\app.dist
          echo "--- compressed size estimate ---"
          powershell -Command "Compress-Archive -Path dist-nuitka\app.dist\* -DestinationPath dist-nuitka\wxHelloWorld-nuitka.zip"
          dir dist-nuitka\wxHelloWorld-nuitka.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-windows-x64-nuitka
          path: dist-nuitka/app.dist

  build-macos-nuitka:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka

      - name: Build .app bundle with Nuitka
        run: >
          python -m nuitka
          --standalone
          --macos-create-app-bundle
          --macos-app-name=wxHelloWorld
          --lto=yes
          --enable-plugin=anti-bloat
          --output-dir=dist-nuitka
          --nofollow-import-to=wx.html,wx.html2,wx.xml,wx.richtext,wx.stc,wx.media,wx.grid,wx.dataview,wx.glcanvas,wx.svg,wx.propgrid,wx.ribbon,wx.aui,wx.py,wx.adv,wx.xrc,tkinter,unittest,test,email,pydoc,doctest,sqlite3,ssl,asyncio,multiprocessing,lib2to3,ensurepip,venv,idlelib,turtledemo,xmlrpc,ftplib,smtplib,imaplib,poplib,socketserver,webbrowser,turtle,concurrent,logging
          --remove-output
          app.py

      - name: Remove unused files from .app
        run: |
          CONTENTS="dist-nuitka/app.app/Contents"
          FWDIR="$CONTENTS/Frameworks"
          RESDIR="$CONTENTS/Resources"
          MACDIR="$CONTENTS/MacOS"

          echo "=== Before cleanup ==="
          du -sh dist-nuitka/app.app

          # Remove unused wx native dylibs
          for pat in "*html*" "*stc*" "*richtext*" "*media*" "*gl*" "*xml*" "*xrc*" "*propgrid*" "*ribbon*" "*aui*" "*svg*" "*webview*" "*qa*" "*adv*"; do
            find dist-nuitka/app.app -name "libwx_osx*${pat}*" -delete 2>/dev/null || true
          done

          # Remove unused wx Python extension modules (.so files)
          for mod in _html _html2 _stc _richtext _media _grid _dataview _glcanvas _svg _propgrid _ribbon _aui _xml _xrc _adv; do
            find dist-nuitka/app.app -name "${mod}.cpython-*.so" -delete 2>/dev/null || true
          done
          # Remove unused wx subpackage directories
          for dir in html html2 stc richtext media grid dataview glcanvas svg propgrid ribbon aui xml xrc py adv; do
            find dist-nuitka/app.app -path "*/wx/${dir}" -type d -exec rm -rf {} + 2>/dev/null || true
          done

          # Remove locale/share directories
          find dist-nuitka/app.app -path "*/locale" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist-nuitka/app.app -path "*/locales" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$RESDIR/share" 2>/dev/null || true

          # Remove .pyi stub files, __pycache__, .dist-info
          find dist-nuitka/app.app -name "*.pyi" -delete 2>/dev/null || true
          find dist-nuitka/app.app -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist-nuitka/app.app -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true

          # Strip dylibs and .so files
          find dist-nuitka/app.app \( -name "*.dylib" -o -name "*.so" \) -exec strip -x -S {} \; 2>/dev/null || true

          echo "=== After cleanup ==="
          du -sh dist-nuitka/app.app

      - name: Smoke test built app
        run: |
          dist-nuitka/app.app/Contents/MacOS/app --smoke-test

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG installer
        run: |
          create-dmg \
            --volname "wxHelloWorld" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "app.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist-nuitka/wxHelloWorld-nuitka.dmg" \
            "dist-nuitka/app.app"

      - name: Show build size
        run: |
          echo "--- Nuitka dist contents ---"
          ls -lh dist-nuitka/
          echo "--- .app bundle size ---"
          du -sh dist-nuitka/app.app
          echo "--- DMG size ---"
          ls -lh dist-nuitka/wxHelloWorld-nuitka.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxHelloWorld-macos-dmg-nuitka
          path: dist-nuitka/wxHelloWorld-nuitka.dmg
